<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>滴伴出行 · v4 — Robotaxi 座舱 AI 伴侣 小桔</title>
<style>
/* ============ 基础 ============ */
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --c-orange:        #FF6B35;
  --c-orange-light:  #FFA76B;
  --c-orange-soft:   #FFD2B8;

  --c-bg-deep:       #050a1a;
  --c-bg-mid:        #0c1830;
  --c-bg-warm:       #1a3060;

  --c-text-main:     #e6efff;
  --c-text-sub:      #8ab4d8;
  --c-text-mute:     #5a7aa8;

  --card-bg:         rgba(20, 35, 75, 0.42);
  --card-border:     rgba(255, 167, 107, 0.16);
  --card-radius:     20px;

  --gap:             18px;
}

html, body { width: 100%; height: 100%; }

body {
  overflow: hidden;
  font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  color: var(--c-text-main);
  user-select: none;
  -webkit-font-smoothing: antialiased;
  background:
    radial-gradient(ellipse 75% 80% at 72% 50%, #1d3568 0%, #0e1d3e 55%, #050a1a 100%);
}

/* ============ 整体布局 ============ */
.layout {
  position: relative;
  width: 100vw; height: 100vh;
}

/* ============ 顶部状态栏 ============ */
.topbar {
  position: absolute; top: 0; left: 0; right: 0;
  height: 56px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 32px;
  z-index: 100;
}
.status-chips { display: flex; gap: 10px; }
.chip {
  padding: 6px 14px;
  border-radius: 14px;
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.06);
  font-size: 12px;
  color: var(--c-text-sub);
  letter-spacing: 0.5px;
  backdrop-filter: blur(8px);
}
.brand-tag {
  display: flex; align-items: center; gap: 12px;
  padding: 6px 16px 6px 8px;
  border-radius: 22px;
  background: linear-gradient(135deg, rgba(255, 107, 53, 0.18), rgba(255, 167, 107, 0.05));
  border: 1px solid rgba(255, 167, 107, 0.25);
  backdrop-filter: blur(10px);
}
.brand-logo {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: linear-gradient(135deg, #FFA76B, #FF6B35);
  display: grid; place-items: center;
  font-size: 16px;
  box-shadow: 0 0 12px rgba(255, 107, 53, 0.5);
}
.brand-text { line-height: 1.1; }
.brand-name {
  font-size: 14px; font-weight: 600;
  color: var(--c-orange-soft); letter-spacing: 2px;
}
.brand-sub {
  font-size: 10px; color: var(--c-text-mute);
  letter-spacing: 2px; margin-top: 2px;
}

/* ============ 左侧信息卡片区 ============ */
.left-panel {
  position: absolute;
  top: 80px;
  bottom: 218px;       /* 底部留给 demo-bar */
  left: 32px;
  width: calc(50% - 56px);
  display: flex; flex-direction: column; gap: var(--gap);
  z-index: 20;
}

/* 卡片通用 */
.card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: var(--card-radius);
  padding: 22px 24px;
  backdrop-filter: blur(20px);
  box-shadow:
    0 8px 32px rgba(0, 0, 0, 0.25),
    inset 0 1px 0 rgba(255, 255, 255, 0.04);
  position: relative;
}
.card-label {
  font-size: 11px;
  color: var(--c-orange-light);
  letter-spacing: 4px;
  margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
  text-transform: uppercase;
  opacity: 0.85;
}

/* ----- 行程卡片 ----- */
.trip-card { flex: 0 0 auto; }
.trip-route {
  font-size: 24px; font-weight: 600;
  color: var(--c-text-main);
  margin-bottom: 6px;
  line-height: 1.3;
  letter-spacing: 0.5px;
}
.trip-detail {
  font-size: 13px;
  color: var(--c-text-sub);
  margin-bottom: 18px;
}
.progress-wrap { margin-bottom: 16px; }
.progress-bar {
  height: 5px;
  background: rgba(100, 150, 220, 0.12);
  border-radius: 3px;
  position: relative;
  overflow: visible;
}
.progress-fill {
  height: 100%; width: 65%;
  background: linear-gradient(90deg, var(--c-orange), var(--c-orange-light));
  border-radius: 3px;
  position: relative;
  box-shadow: 0 0 8px rgba(255, 107, 53, 0.5);
}
.progress-fill::after {
  content: ''; position: absolute; right: -6px; top: -3.5px;
  width: 12px; height: 12px;
  background: var(--c-orange-light);
  border-radius: 50%;
  box-shadow: 0 0 12px rgba(255, 167, 107, 0.8);
}
.trip-time-wrap {
  display: flex; align-items: baseline; gap: 10px;
}
.trip-time-num {
  font-size: 42px; font-weight: 700;
  color: var(--c-text-main);
  letter-spacing: 1px;
  line-height: 1;
}
.trip-time-unit {
  font-size: 14px;
  color: var(--c-text-sub);
}
.trip-eta {
  margin-left: auto;
  font-size: 11px;
  color: var(--c-text-mute);
  letter-spacing: 2px;
}

/* ----- 对话卡片 ----- */
.chat-card {
  flex: 1 1 auto;
  display: flex; flex-direction: column;
  min-height: 0;
}
.dot-pulse {
  display: inline-block;
  width: 7px; height: 7px;
  background: var(--c-orange);
  border-radius: 50%;
  box-shadow: 0 0 8px rgba(255, 107, 53, 0.7);
  animation: pulse 1.6s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 0.4; transform: scale(0.85); }
  50%      { opacity: 1;   transform: scale(1.1); }
}
.chat {
  flex: 1 1 auto;
  display: flex; flex-direction: column; gap: 10px;
  overflow-y: auto;
  padding-right: 4px;
  min-height: 80px;
}
.chat::-webkit-scrollbar { width: 0; }

.msg {
  max-width: 88%;
  padding: 10px 14px;
  border-radius: 14px;
  font-size: 14px;
  line-height: 1.55;
  opacity: 0;
  animation: msgFadeUp 0.4s ease forwards;
  word-break: break-all;
}
.msg.user {
  background: rgba(80, 130, 200, 0.18);
  color: #c0d8f0;
  align-self: flex-end;
  border: 1px solid rgba(80, 130, 200, 0.25);
  border-bottom-right-radius: 4px;
}
.msg.didi {
  background: linear-gradient(135deg, rgba(255, 107, 53, 0.18), rgba(255, 167, 107, 0.08));
  color: var(--c-orange-soft);
  align-self: flex-start;
  border: 1px solid rgba(255, 107, 53, 0.25);
  border-bottom-left-radius: 4px;
}
@keyframes msgFadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ============ 场景模拟控制条（底部长条） ============ */
.demo-bar {
  position: absolute;
  left: 32px; right: 32px; bottom: 28px;
  height: 172px;
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: var(--card-radius);
  padding: 16px 22px;
  backdrop-filter: blur(20px);
  box-shadow:
    0 8px 32px rgba(0, 0, 0, 0.30),
    inset 0 1px 0 rgba(255, 255, 255, 0.05);
  z-index: 40;
  display: grid;
  grid-template-columns: 300px 1fr;
  gap: 22px;
  align-items: stretch;
}
.demo-bar-head {
  display: flex; flex-direction: column; gap: 8px;
  border-right: 1px solid rgba(255, 255, 255, 0.07);
  padding-right: 22px;
  min-width: 0;
  overflow: hidden;
}
.demo-bar-head .card-label { margin-bottom: 2px; }

.demo-tabs {
  display: flex; flex-wrap: wrap;
  gap: 5px;
}
.demo-tabs .tab {
  background: rgba(255, 255, 255, 0.04);
  color: var(--c-text-sub);
  border: 1px solid rgba(255, 255, 255, 0.07);
  padding: 5px 11px;
  border-radius: 10px;
  font-size: 11.5px;
  cursor: pointer;
  font-family: inherit;
  letter-spacing: 1px;
  transition: all 180ms ease;
}
.demo-tabs .tab:hover {
  background: rgba(255, 167, 107, 0.10);
  color: var(--c-orange-soft);
  border-color: rgba(255, 167, 107, 0.25);
}
.demo-tabs .tab.active {
  background: linear-gradient(135deg, rgba(255, 107, 53, 0.40), rgba(255, 107, 53, 0.20));
  color: #fff;
  border-color: rgba(255, 107, 53, 0.60);
  box-shadow: 0 2px 10px rgba(255, 107, 53, 0.28);
}

.demo-desc {
  font-size: 11px;
  color: var(--c-text-mute);
  letter-spacing: 0.4px;
  line-height: 1.55;
  margin-top: auto;       /* 底部对齐 */
}

.demo-buttons {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-auto-rows: min-content;
  gap: 8px;
  align-content: start;
  overflow-y: auto;
  padding-right: 4px;
  min-width: 0;
}
.demo-buttons::-webkit-scrollbar { width: 4px; }
.demo-buttons::-webkit-scrollbar-thumb {
  background: rgba(255, 167, 107, 0.18);
  border-radius: 2px;
}
.demo-buttons button {
  background: rgba(255, 255, 255, 0.05);
  color: var(--c-text-main);
  border: 1px solid rgba(255, 255, 255, 0.08);
  padding: 9px 12px;
  border-radius: 10px;
  font-size: 12.5px;
  cursor: pointer;
  font-family: inherit;
  letter-spacing: 0.5px;
  text-align: left;
  transition: all 180ms ease;
  line-height: 1.3;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.demo-buttons button:hover {
  background: rgba(255, 167, 107, 0.16);
  border-color: rgba(255, 167, 107, 0.42);
  color: var(--c-orange-soft);
  transform: translateY(-1px);
}
.demo-buttons button:active {
  transform: translateY(0);
}
.demo-buttons button[data-kind="emergency"] {
  background: rgba(220, 60, 60, 0.14);
  border-color: rgba(220, 60, 60, 0.32);
  color: #ffb0b0;
}
.demo-buttons button[data-kind="emergency"]:hover {
  background: rgba(220, 60, 60, 0.24);
  border-color: rgba(220, 60, 60, 0.55);
  color: #ffd0d0;
}
.demo-buttons button[data-kind="state"] {
  background: rgba(120, 160, 255, 0.10);
  border-color: rgba(120, 160, 255, 0.22);
  color: #b8d0ff;
}
.demo-buttons button[data-kind="state"]:hover {
  background: rgba(120, 160, 255, 0.18);
  color: #d0e0ff;
}

/* ============ 右侧：小桔主舞台 ============ */
.right-stage {
  position: absolute;
  top: 0; right: 0;
  bottom: 218px;       /* 底部留给 demo-bar */
  width: 50%;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
  z-index: 10;
}

/* 装饰星点 */
.stars { position: absolute; inset: 0; pointer-events: none; }
.stars span {
  position: absolute;
  width: 2px; height: 2px;
  background: white; border-radius: 50%;
  opacity: 0.25;
  animation: twinkle 4s ease-in-out infinite;
}
@keyframes twinkle {
  0%, 100% { opacity: 0.15; transform: scale(1); }
  50%      { opacity: 0.55; transform: scale(1.4); }
}

/* ============ 小桔本体（橘子 PNG）============ */
.mascot-stage {
  position: relative;
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  perspective: 1000px;
  transition: transform 520ms cubic-bezier(0.25, 1, 0.5, 1);
  transform-origin: bottom center;
}
/* 气泡显示时：小桔自动下移 + 微缩，给气泡让位 */
.mascot-stage.invite-shown {
  transform: translateY(54px) scale(0.86);
}

.mascot {
  --tx: 0px;
  --ty: 0px;
  --scale: 1;
  --tilt: 0deg;
  --glow-size: 60px;
  --glow-strength: 0.45;
  --glow-color: 255, 107, 53;
  --img-brightness: 1;
  --img-saturate: 1;

  position: relative;
  width: 380px; height: 380px;
  display: flex; align-items: center; justify-content: center;

  transform:
    translate(var(--tx), var(--ty))
    scale(var(--scale))
    rotate(var(--tilt));

  transition:
    --glow-size 600ms ease,
    --glow-strength 600ms ease,
    --glow-color 400ms ease,
    --img-brightness 400ms ease,
    --img-saturate 400ms ease;

  z-index: 5;
}

.mascot-img {
  width: 100%; height: 100%;
  object-fit: contain;
  filter:
    brightness(var(--img-brightness))
    saturate(var(--img-saturate))
    drop-shadow(0 0 var(--glow-size) rgba(var(--glow-color), var(--glow-strength)))
    drop-shadow(0 0 calc(var(--glow-size) * 2) rgba(var(--glow-color), calc(var(--glow-strength) * 0.5)))
    drop-shadow(0 12px 24px rgba(0, 0, 0, 0.35));
  pointer-events: none;
  user-select: none;
  -webkit-user-drag: none;
}

/* 地面光斑 */
.mascot-shadow {
  position: absolute;
  bottom: 18%;
  width: 220px; height: 32px;
  background: radial-gradient(ellipse, rgba(255, 107, 53, 0.45) 0%, transparent 70%);
  border-radius: 50%;
  filter: blur(10px);
  z-index: 1;
  animation: shadowBreath 3.2s ease-in-out infinite;
}
@keyframes shadowBreath {
  0%, 100% { transform: scale(1);   opacity: 0.7; }
  50%      { transform: scale(0.9); opacity: 0.5; }
}

/* listening：脉冲光环 */
.mascot[data-state="listening"]::before {
  content: '';
  position: absolute;
  width: 100%; height: 100%;
  border-radius: 50%;
  border: 2px solid rgba(255, 167, 107, 0.5);
  animation: pulseRing 1.4s ease-out infinite;
  pointer-events: none;
}
@keyframes pulseRing {
  0%   { transform: scale(0.8); opacity: 1; }
  100% { transform: scale(1.6); opacity: 0; }
}

/* ============ 小桔装饰层（多形态系统） ============ */
.mascot-decor {
  position: absolute;
  inset: 0;
  pointer-events: none;
}
.mascot-decor--back  { z-index: 4; }
.mascot-decor--front { z-index: 6; }

/* —— 漂浮 emoji（happy/sleepy/curious 用）—— */
.decor-float {
  position: absolute;
  font-size: 30px;
  bottom: 75%;
  opacity: 0;
  animation: floatUp 3s ease-in-out infinite;
  filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.3));
}
.decor-float:nth-child(1) { left: 22%; animation-delay: 0s;   }
.decor-float:nth-child(2) { left: 50%; animation-delay: 1s;   font-size: 36px; }
.decor-float:nth-child(3) { left: 75%; animation-delay: 2s;   }
@keyframes floatUp {
  0%   { transform: translateY(0)    scale(0.6); opacity: 0; }
  20%  { opacity: 1; }
  100% { transform: translateY(-90px) scale(1.1); opacity: 0; }
}

/* —— 头顶装饰（雨天伞、惊讶气泡等）—— */
.decor-hat {
  position: absolute;
  font-size: 64px;
  left: 50%;
  top: -8%;
  transform-origin: bottom center;
  animation: hatBob 2.4s ease-in-out infinite;
  filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.4));
}
@keyframes hatBob {
  0%, 100% { transform: translateX(-50%) rotate(-8deg) translateY(0); }
  50%      { transform: translateX(-50%) rotate(-4deg) translateY(-4px); }
}

/* —— 侧面装饰（夜晚月亮、问号气泡等）—— */
.decor-side {
  position: absolute;
  font-size: 52px;
  right: -6%;
  top: 8%;
  animation: sideFloat 3.6s ease-in-out infinite;
  filter: drop-shadow(0 0 14px rgba(255, 230, 150, 0.6));
}
@keyframes sideFloat {
  0%, 100% { transform: translateY(0)    rotate(-4deg); }
  50%      { transform: translateY(-10px) rotate(6deg); }
}

/* —— 头顶旗子（探索模式）—— */
.decor-flag {
  position: absolute;
  font-size: 44px;
  left: 50%;
  top: -4%;
  transform: translateX(-50%);
  animation: flagWave 1.4s ease-in-out infinite;
  filter: drop-shadow(0 3px 6px rgba(0, 0, 0, 0.35));
}
@keyframes flagWave {
  0%, 100% { transform: translateX(-50%) rotate(-12deg); }
  50%      { transform: translateX(-50%) rotate(12deg);  }
}

/* —— 守护盾光环（应急 L3）—— */
.decor-shield {
  position: absolute;
  left: 50%; top: 50%;
  width: 110%; height: 110%;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  border: 3px solid rgba(255, 130, 80, 0.55);
  box-shadow:
    0 0 40px rgba(255, 130, 80, 0.45),
    inset 0 0 30px rgba(255, 130, 80, 0.25);
  animation: shieldPulse 1.8s ease-in-out infinite;
}
.decor-shield::after {
  content: '🛡';
  position: absolute;
  top: -16px; left: 50%;
  transform: translateX(-50%);
  font-size: 36px;
  filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.4));
}
@keyframes shieldPulse {
  0%, 100% { transform: translate(-50%, -50%) scale(1);    opacity: 0.6; }
  50%      { transform: translate(-50%, -50%) scale(1.06); opacity: 1;   }
}

/* —— 雨滴（雨天形态背景层）—— */
.decor-rain {
  position: absolute;
  inset: 0;
  overflow: hidden;
}
.decor-rain span {
  position: absolute;
  top: -20px;
  width: 2px; height: 14px;
  background: linear-gradient(transparent, rgba(180, 220, 255, 0.7));
  border-radius: 2px;
  animation: rainFall 1.2s linear infinite;
}
@keyframes rainFall {
  0%   { transform: translateY(0)    rotate(8deg); opacity: 0; }
  20%  { opacity: 1; }
  100% { transform: translateY(420px) rotate(8deg); opacity: 0; }
}

/* alert：危险红圈警示 */
.mascot[data-state="alert"]::before {
  content: '';
  position: absolute;
  width: 110%; height: 110%;
  border-radius: 50%;
  border: 3px solid rgba(255, 80, 80, 0.6);
  animation: alertFlash 0.6s ease-in-out infinite alternate;
  pointer-events: none;
}
@keyframes alertFlash {
  0%   { opacity: 0.4; transform: scale(0.95); }
  100% { opacity: 1;   transform: scale(1.05); }
}

/* ============ 主动邀请弹窗（颜色 + 图标随当前小桔形态变化）============ */
.invite {
  /* 默认橙色调（idle/curious 时） */
  --invite-tone: 255, 167, 107;
  --invite-soft: 255, 210, 184;

  position: absolute;
  /* 固定 96px：完全避开 topbar (56px) + 40px 呼吸距离，跟右上 brand-tag 错开垂直层 */
  top: 96px;
  left: 50%;
  transform: translate(-50%, -10px);
  width: 360px;
  background: linear-gradient(135deg, rgba(40, 60, 110, 0.92), rgba(20, 35, 75, 0.92));
  backdrop-filter: blur(16px);
  border: 1px solid rgba(var(--invite-tone), 0.5);
  border-radius: 18px;
  padding: 16px 18px;
  z-index: 80;
  opacity: 0; pointer-events: none;
  transition:
    opacity 400ms ease,
    transform 400ms cubic-bezier(.16,1.16,.42,1.05),
    border-color 400ms ease,
    box-shadow 400ms ease;
  box-shadow:
    0 16px 40px rgba(0, 0, 0, 0.4),
    0 0 28px rgba(var(--invite-tone), 0.22);
}
.invite.show {
  opacity: 1;
  transform: translate(-50%, 0);
  pointer-events: auto;
}
/* 指向橘子的小尾巴 */
.invite::after {
  content: '';
  position: absolute;
  bottom: -8px; left: 50%;
  transform: translateX(-50%) rotate(45deg);
  width: 16px; height: 16px;
  background: rgba(20, 35, 75, 0.92);
  border-right: 1px solid rgba(var(--invite-tone), 0.5);
  border-bottom: 1px solid rgba(var(--invite-tone), 0.5);
  transition: border-color 400ms ease;
}
.invite-text {
  font-size: 14px;
  color: rgba(var(--invite-soft), 1);
  line-height: 1.55;
  margin-bottom: 12px;
  display: flex; align-items: flex-start; gap: 8px;
  transition: color 400ms ease;
}
.invite-text::before {
  content: attr(data-icon);
  font-size: 16px;
  flex-shrink: 0;
  margin-top: 1px;
}
.invite-options { display: flex; gap: 8px; }
.invite-options button {
  flex: 1;
  background: rgba(var(--invite-tone), 0.14);
  color: rgba(var(--invite-soft), 0.95);
  border: 1px solid rgba(var(--invite-tone), 0.32);
  padding: 7px 12px; border-radius: 12px;
  font-size: 12px; cursor: pointer;
  font-family: inherit;
  transition: all 180ms ease;
}
.invite-options button:hover {
  background: rgba(var(--invite-tone), 0.26);
  transform: translateY(-1px);
}
.invite-options button[data-resp="silent"] {
  background: rgba(255, 255, 255, 0.04);
  color: var(--c-text-sub);
  border-color: rgba(255, 255, 255, 0.08);
}

/* ============ 角标 + 版本水印（隐式提示）============ */
.version-tag {
  position: absolute;
  bottom: 12px; right: 16px;
  font-size: 10px;
  color: var(--c-text-mute);
  letter-spacing: 2px;
  z-index: 5;
  opacity: 0.5;
}

/* ============ 响应式：低分辨率适配（最低 1366）============ */
@media (max-width: 1500px) {
  .mascot { width: 320px; height: 320px; }
  .trip-route { font-size: 22px; }
  .trip-time-num { font-size: 36px; }

<script>

/* ============================================================

  },
  listening: {
    scale: 1.02, tilt: 0,
    glowSize: 100, glowStrength: 0.7, glowColor: '255, 167, 107',
    imgBrightness: 1.06, imgSaturate: 1.08,

    breathAmp: 0.014, swayAmp: 0, bobAmp: 2,
    decor: { kind: 'float', items: ['🎵', '♪', '🎵'] },
    icon: '👂', tone: '255, 167, 107', soft: '255, 210, 184',
    lines: ['我在认真听呢', '你说，我听着']
  },
  sleepy: {

    imgBrightness: 0.78, imgSaturate: 0.7,

    breathAmp: 0.012, swayAmp: 0.4, bobAmp: 1.5,
    decor: { kind: 'float', items: ['💤', '💤', '💤'] },
    icon: '💤', tone: '180, 130, 90', soft: '230, 200, 170',

    imgBrightness: 1.05, imgSaturate: 1.25,

function randomLine(state) {
  const cfg = STATE_CONFIGS[state];
  if (!cfg) return null;
  if (cfg.lines && cfg.lines.length) {
    return cfg.lines[Math.floor(Math.random() * cfg.lines.length)];
  }
  return cfg.line || null;
}

/* ============ 当前与目标参数（lerp 平滑过渡）============ */
let current = { ...STATE_CONFIGS.idle };
let target  = { ...STATE_CONFIGS.idle };
const LERP = 0.05;

/* ============ 弹簧物理（鼠标跟随）============ */
let spring = { tx: 0, ty: 0, vx: 0, vy: 0 };
const STIFFNESS = 0.012;       // 调硬：从 0.006 → 0.012，弹簧响应更跟手，残余晃动更快归位
const DAMPING   = 0.86;        // 阻尼略大：从 0.9 → 0.86，避免长时间衰减振荡
const SPRING_VELOCITY_CAP = 6; // 速度上限：防止累积冲量导致的剧烈抖动
let mouseX = 0, mouseY = 0;

const mascot = document.getElementById('mascot');
const stage  = document.querySelector('.mascot-stage');

document.addEventListener('mousemove', e => {
  const rect = stage.getBoundingClientRect();
  mouseX = (e.clientX - rect.left - rect.width / 2)  * 0.04;
  mouseY = (e.clientY - rect.top  - rect.height / 2) * 0.04;
});

/* ============ 数值 lerp 主循环 ============ */
const numericKeys = [
  'scale', 'tilt',
  'glowSize', 'glowStrength',
  'imgBrightness', 'imgSaturate',
  'breathSpeed', 'swaySpeed', 'bobSpeed',
  'breathAmp', 'swayAmp', 'bobAmp'
];

let t0 = performance.now();
function animate(now) {
  const t = (now - t0) / 1000;

  for (const k of numericKeys) {
    current[k] += (target[k] - current[k]) * LERP;
  }
  current.glowColor = target.glowColor;

  spring.vx += (mouseX - spring.tx) * STIFFNESS;
  spring.vy += (mouseY - spring.ty) * STIFFNESS;
  spring.vx *= DAMPING;
  spring.vy *= DAMPING;
  // 速度截断，防止任何意外脉冲累积
  if (spring.vx >  SPRING_VELOCITY_CAP) spring.vx =  SPRING_VELOCITY_CAP;
  if (spring.vx < -SPRING_VELOCITY_CAP) spring.vx = -SPRING_VELOCITY_CAP;
  if (spring.vy >  SPRING_VELOCITY_CAP) spring.vy =  SPRING_VELOCITY_CAP;
  if (spring.vy < -SPRING_VELOCITY_CAP) spring.vy = -SPRING_VELOCITY_CAP;
  spring.tx += spring.vx;
  spring.ty += spring.vy;

  const breath = Math.sin(t * current.breathSpeed) * current.breathAmp;
  const sway   = (Math.sin(t * current.swaySpeed) + Math.sin(t * current.swaySpeed * 0.7 + 1)) * current.swayAmp * 0.5;
  const bob    = (Math.sin(t * current.bobSpeed)  + Math.sin(t * current.bobSpeed * 0.6))      * current.bobAmp  * 0.5;

  const style = mascot.style;
  style.setProperty('--tx',              spring.tx.toFixed(2) + 'px');
  style.setProperty('--ty',              (spring.ty + bob).toFixed(2) + 'px');
  style.setProperty('--scale',           (current.scale + breath).toFixed(4));
  style.setProperty('--tilt',            (current.tilt + sway).toFixed(2) + 'deg');
  style.setProperty('--glow-size',       current.glowSize.toFixed(0) + 'px');
  style.setProperty('--glow-strength',   current.glowStrength.toFixed(2));
  style.setProperty('--glow-color',      current.glowColor);
  style.setProperty('--img-brightness',  current.imgBrightness.toFixed(3));
  style.setProperty('--img-saturate',    current.imgSaturate.toFixed(3));

  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);

/* ============ 装饰层渲染 ============ */
const decorBack  = document.getElementById('mascotDecorBack');
const decorFront = document.getElementById('mascotDecorFront');

function setDecor(cfg) {
  decorBack.innerHTML  = '';
  decorFront.innerHTML = '';
  if (!cfg) return;
  switch (cfg.kind) {
    case 'float': {           // 漂浮 emoji（前景）
      cfg.items.forEach(emoji => {
        const s = document.createElement('span');
        s.className = 'decor-float';
        s.textContent = emoji;
        decorFront.appendChild(s);
      });
      break;
    }
    case 'hat': {             // 头顶大装饰（前景）
      const s = document.createElement('span');
      s.className = 'decor-hat';
      s.textContent = cfg.emoji;
      decorFront.appendChild(s);
      break;
    }
    case 'side': {            // 侧面装饰（前景）
      const s = document.createElement('span');
      s.className = 'decor-side';
      s.textContent = cfg.emoji;
      decorFront.appendChild(s);
      break;
    }
    case 'flag': {            // 头顶旗帜（前景）
      const s = document.createElement('span');
      s.className = 'decor-flag';
      s.textContent = cfg.emoji;
      decorFront.appendChild(s);
      break;
    }
    case 'shield': {          // 守护光环（背景层）
      const s = document.createElement('div');
      s.className = 'decor-shield';
      decorBack.appendChild(s);
      break;
    }
    case 'rainy': {           // 雨滴（背景）+ 头顶伞（前景）
      const rain = document.createElement('div');
      rain.className = 'decor-rain';
      for (let i = 0; i < 14; i++) {
        const drop = document.createElement('span');
        drop.style.left = (Math.random() * 100) + '%';
        drop.style.animationDelay = (Math.random() * 1.2) + 's';
        drop.style.animationDuration = (0.8 + Math.random() * 0.7) + 's';
        rain.appendChild(drop);
      }
      decorBack.appendChild(rain);
      const hat = document.createElement('span');
      hat.className = 'decor-hat';
      hat.textContent = cfg.emoji;
      decorFront.appendChild(hat);
      break;
    }
  }
}

/* ============ 状态切换 ============ */
let returnTimer       = null;
let lastSwitchTime    = 0;
const SWITCH_BOUNCE_MS = 400;     // 同一形态切换冷却（避免短时间重复触发抖动）

function switchTo(state, autoReturn = true) {
  if (!STATE_CONFIGS[state]) return;

  // 防抖：同一目标状态短时间重复切换 → 直接忽略（防止累积抖动）
  const now = performance.now();
  if (mascot.dataset.state === state && now - lastSwitchTime < SWITCH_BOUNCE_MS) {
    return;
  }
  lastSwitchTime = now;

  target = { ...STATE_CONFIGS[state] };
  mascot.dataset.state = state;
  setDecor(STATE_CONFIGS[state].decor);

  // 轻微的反馈脉冲：从 -4 改成 -1.5，并且只在切换到非 idle 时触发
  // 配合速度截断，单次脉冲温和，多次叠加也不会失控
  if (state !== 'idle') {
    spring.vy = Math.max(spring.vy - 1.5, -SPRING_VELOCITY_CAP);
  }

  if (returnTimer) { clearTimeout(returnTimer); returnTimer = null; }
  if (autoReturn && state !== 'idle' && state !== 'alert') {
    returnTimer = setTimeout(() => switchTo('idle'), 8000);
  }
}

/* ============ 对话 ============ */
const chat = document.getElementById('chat');
function addMessage(who, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + who;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  while (chat.children.length > 8) chat.removeChild(chat.firstChild);
}

/* ============ 主动邀请弹窗（支持自定义文案 + 接受/代办回复 + 自动 fallback） ============ */
const invite      = document.getElementById('invite');
const inviteText  = document.getElementById('invite-text');
let inviteAccept  = '好的，这就给您安排～';
let inviteAuto    = '没问题，我来挑～';
let inviteTimer   = null;
const INVITE_TIMEOUT_MS = 14000;     // 14 秒未响应自动收起

function showInvite(text, opts = {}) {
  const state = opts.state || 'curious';
  const cfg   = STATE_CONFIGS[state] || STATE_CONFIGS.curious;

  inviteText.textContent = text;
  inviteText.dataset.icon = opts.icon || cfg.icon || '🍊';

  // 气泡颜色跟形态匹配（边框、阴影、按钮、文字色）
  invite.style.setProperty('--invite-tone', cfg.tone || '255, 167, 107');
  invite.style.setProperty('--invite-soft', cfg.soft || '255, 210, 184');

  inviteAccept = opts.accept || '好的，这就给您安排～';
  inviteAuto   = opts.auto   || '没问题，我来挑～';
  invite.classList.add('show');
  stage.classList.add('invite-shown');     // 小桔下移 + 微缩，给气泡让位
  switchTo(state, false);

  if (inviteTimer) clearTimeout(inviteTimer);
  inviteTimer = setTimeout(() => {
    if (invite.classList.contains('show')) hideInvite('timeout');
  }, INVITE_TIMEOUT_MS);
}
function hideInvite(action) {
  invite.classList.remove('show');
  stage.classList.remove('invite-shown');  // 桔子回到中心位置
  if (inviteTimer) { clearTimeout(inviteTimer); inviteTimer = null; }
  if (action === 'ok')      { addMessage('didi', inviteAccept); switchTo('happy'); }
  if (action === 'auto')    { addMessage('didi', inviteAuto);   switchTo('happy'); }
  if (action === 'silent')  { switchTo('idle'); }                         // 零失落：不卖惨
  if (action === 'timeout') { switchTo('idle'); }                         // 自动收起也回 idle
}
document.querySelectorAll('.invite-options button').forEach(btn => {
  btn.addEventListener('click', () => { lastUserAction = Date.now(); hideInvite(btn.dataset.resp); });
});

/* ============================================================
   场景数据：按 PRD 6 大功能分组
   话术全部来自《话术库 v2.0》
   - voice     : 模拟用户语音 → listening → 思考 → 回复
   - invite    : 直接弹主动邀请卡片（含三选项）
   - emergency : 应急 ≤0.5s 内回复，alert 状态停留若干秒
   - state     : 直接切换形象状态

/* ============ 场景执行引擎（每种 kind 都保证有 didi 回复） ============ */
let lastUserAction = 0;        // 自动切换会避开最近的人为操作
function pickReply(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function runScenario(item) {
  lastUserAction = Date.now();

  switch (item.kind) {
    case 'voice': {
      switchTo('listening', false);
      setTimeout(() => addMessage('user', item.user), 500);
      setTimeout(() => {
        switchTo(item.state || 'happy');
        addMessage('didi', pickReply(item.didi));
      }, 1900);
      break;
    }
    case 'invite': {
      const inviteDelay = item.user ? 700 : 200;
      if (item.user) addMessage('user', item.user);
      setTimeout(() => {
        addMessage('didi', item.invite);
        showInvite(item.invite, {
          accept: item.accept,
          auto:   item.auto,           // "你帮我选" 时小桔的代办回复
          state:  item.state,
          icon:   item.icon
        });
      }, inviteDelay);
      break;
    }
    case 'emergency': {
      if (item.user) addMessage('user', item.user);
      switchTo(item.state || 'alert', false);
      setTimeout(() => addMessage('didi', pickReply(item.didi)), 250);
      setTimeout(() => switchTo('idle'), item.stayMs || 6000);
      if (item.followup) {
        setTimeout(() => {
          if (item.followup.state) switchTo(item.followup.state);
          if (item.followup.didi)  addMessage('didi', item.followup.didi);
        }, item.followup.delay);
      }
      break;
    }
    case 'state': {
      switchTo(item.state, item.state !== 'alert' && item.state !== 'idle');
      // 切到非默认形态时，让小桔自报家门
      const line = randomLine(item.state);
      if (line) setTimeout(() => addMessage('didi', line), 300);
      break;
    }
  }
}

/* ============ Tab + 按钮渲染 ============ */
const tabsEl    = document.getElementById('demoTabs');
const buttonsEl = document.getElementById('demoButtons');
const descEl    = document.getElementById('demoDesc');

function renderTab(tabId) {
  const group = SCENARIOS[tabId];
  if (!group) return;
  descEl.textContent = group.desc;
  buttonsEl.innerHTML = '';
  group.items.forEach(item => {
    const btn = document.createElement('button');
    btn.textContent = item.label;
    btn.dataset.kind = item.kind;
    btn.addEventListener('click', () => runScenario(item));
    buttonsEl.appendChild(btn);
  });
  tabsEl.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === tabId);
  });
}
tabsEl.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => renderTab(tab.dataset.tab));
});
renderTab('kefu');

/* ============================================================
   自动形态切换 ① 待机微切换
   - PRD 3.1：「待机状态下，持续播放随机 idle 微动画」
   - 实现：idle 时 + 最近无操作时，每 7s 有 45% 概率
           随机切到 curious/happy/listening 中的一个，自动 8s 回 idle
   ============================================================ */
const IDLE_VARIANTS = ['curious', 'happy', 'listening', 'curious'];
setInterval(() => {
  if (mascot.dataset.state !== 'idle')        return;
  if (invite.classList.contains('show'))      return;
  if (Date.now() - lastUserAction < 6000)     return;       // 最近 6s 内有人为操作 → 不打扰
  if (Math.random() < 0.45) {
    switchTo(IDLE_VARIANTS[Math.floor(Math.random() * IDLE_VARIANTS.length)]);
  }
}, 7000);

/* ============================================================
   自动形态切换 ② 环境感知（mock 时间轴）
   - PRD 3.1：「检测到特殊场景（下雨/夜晚/拥堵），主动场景化形变」
   - 实现：启动后按时间轴依次模拟 雨天 / 夜晚 / 探索 / 守护 环境信号
           每次自动切到对应形态 + 一句解说，5-6s 后回 idle
   ============================================================ */
const ENV_TIMELINE = [
  { delay: 28000,  state: 'rainy',   line: '我感受到外面开始下雨了，给你撑把伞', stay: 6000 },
  { delay: 70000,  state: 'night',   line: '到 22 点了，我把光调暖一些～',       stay: 6000 },
  { delay: 115000, state: 'explore', line: '左前方有个有意思的地标，要不要听听', stay: 5500 },
  { delay: 160000, state: 'sleepy',  line: '路还有一段，安静地陪你坐一会儿',   stay: 6000 },
];
ENV_TIMELINE.forEach(env => {
  setTimeout(() => {
    if (Date.now() - lastUserAction < 8000)   return;
    if (invite.classList.contains('show'))     return;
    if (mascot.dataset.state !== 'idle' &&
        !IDLE_VARIANTS.includes(mascot.dataset.state)) return;  // 当前在玩别的形态就跳过
    switchTo(env.state, false);
    addMessage('didi', env.line);
    setTimeout(() => switchTo('idle'), env.stay);
  }, env.delay);
});

/* ============ 时钟 ============ */

  const d = new Date();
  document.getElementById('clock').textContent =
    String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
}
